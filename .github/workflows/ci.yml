name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine (FekthorKit)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build --package-path swift/FekthorKit
      - name: Test
        run: swift test --package-path swift/FekthorKit

  app:
    name: macOS app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate project
        run: cd apps/fekthor-macos && xcodegen generate
      - name: Build app
        run: |
          cd apps/fekthor-macos
          xcodebuild -project Fekthor.xcodeproj -scheme Fekthor \
            -configuration Debug -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO build
